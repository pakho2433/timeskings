name: Test Bear Race

on:
  push:
    branches:
      - main
      - codex/bear-race-10-stage-course
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check JavaScript syntax
        run: |
          node --check server/server.js
          node --check server/roomManager.js
          node --check server/gameLogic.js
          node --check public/js/game.js
          node --check public/js/ui.js
          node --check public/js/main.js
          node --check public/js/network.js
          node --check public/js/controls.js
      - name: Run tests
        run: npm test
